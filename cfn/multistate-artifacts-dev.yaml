# cfn/multistate-artifacts-dev.yaml
# TASK 3 S3 artefact bucket -- holds W5 D4 SAM artefacts and Argo CD config
# snapshots. Hardened defaults from day one. Both DeletionPolicy: Retain AND
# UpdateReplacePolicy: Retain so neither a stack delete nor a property-change
# replacement ever destroys live data.
#
# REPO SUB (shared account 196939353484): bucket prefix is TRAINEE-scoped (was
# "uptimecrew-...") so it doesn't collide with other trainees; ${AWS::AccountId}
# further disambiguates. Deploy with stack name geetanjay-manik-multistate-artifacts-dev.
AWSTemplateFormatVersion: "2010-09-09"
Description: multistate artefact bucket -- KMS, PAB, lifecycle, deny-non-TLS.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  MultistateArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: Server access logging deferred for the dev artefact bucket -- would require a separate log-target bucket; revisit for prod.
    Properties:
      BucketName: !Sub "geetanjay-manik-multistate-artifacts-dev-${AWS::AccountId}"
      VersioningConfiguration: {Status: Enabled}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       true
        BlockPublicPolicy:     true
        IgnorePublicAcls:      true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          # Tier down over time: STANDARD_IA at 90d, GLACIER_IR at 365d.
          - Id: tier-storage-class
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
              - StorageClass: GLACIER_IR
                TransitionInDays: 365
          - Id: expire-old-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - {Key: Env,     Value: !Ref EnvName}
        - {Key: Project, Value: multistate}

  ArtefactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MultistateArtifactsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt MultistateArtifactsBucket.Arn
              - !Sub "${MultistateArtifactsBucket.Arn}/*"
            Condition:
              Bool: {"aws:SecureTransport": "false"}
          - Sid: DenyUnencryptedPut
            Effect: Deny
            Principal: "*"
            Action: s3:PutObject
            Resource: !Sub "${MultistateArtifactsBucket.Arn}/*"
            Condition:
              StringNotEquals:
                "s3:x-amz-server-side-encryption": aws:kms

Outputs:
  ArtefactBucketName:
    Value: !Ref MultistateArtifactsBucket
    Export: {Name: !Sub "${AWS::StackName}-BucketName"}
  ArtefactBucketArn:
    Value: !GetAtt MultistateArtifactsBucket.Arn
    Export: {Name: !Sub "${AWS::StackName}-BucketArn"}
