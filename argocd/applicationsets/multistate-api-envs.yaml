# argocd/applicationsets/multistate-api-envs.yaml
# Templates one Application per env. The list generator drives (env, overlay,
# namespace, wave) tuples; the inner clusters generator scopes the fleet to
# clusters labelled tier=workload. Adding an env is a one-line list entry.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multistate-api-envs
  namespace: argocd
spec:
  # If an env drops out of the matrix, KEEP its Application + workload running;
  # a human re-reviews before any teardown. (delete) is the wrong default for prod.
  syncPolicy:
    preserveResourcesOnDeletion: true

  generators:
    - matrix:
        generators:
          # A: explicit env list.
          - list:
              elements:
                - env: dev
                  overlay: overlays/dev
                  namespace: multistate-dev
                  wave: "0"
                - env: staging
                  overlay: overlays/staging
                  namespace: multistate-staging
                  wave: "1"
                - env: prod
                  overlay: overlays/prod
                  namespace: multistate-prod
                  wave: "2"
          # B: every cluster labelled tier=workload. The platform team labels the
          # registered cluster Secret at install time (for local k3d, we label the
          # in-cluster Secret ourselves -- see GITOPS.md).
          - clusters:
              selector:
                matchLabels:
                  uptimecrew.example.internal/tier: workload

  template:
    metadata:
      name: multistate-api-{{env}}
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        # Cross-env promotion order on a multi-Application sync: dev, then
        # staging, then prod. (Intra-app ordering lives on the overlay resources.)
        argocd.argoproj.io/sync-wave: "{{wave}}"
      labels:
        env:  "{{env}}"
        team: multistate
    spec:
      project: multistate
      source:
        repoURL:        https://github.com/AI-Native-2026-06-12-Intuit/geetanjay-manik-multistate-config.git
        path:           "{{overlay}}"
        targetRevision: main
      destination:
        server:    "{{server}}"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune:    true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration:    10s
            factor:      2
            maxDuration: 3m
