# manifests/40-multistate-api.secret.yaml — app Secret (PLACEHOLDER, committed).
# Use stringData (plaintext in; Kubernetes base64-encodes) — never hand-base64'd
# data:. The committed value is a placeholder; locally you override it with the
# real dev password (which must match the in-cluster Postgres in 05-backing):
#
#   kubectl create secret generic multistate-api-secrets -n multistate-dev \
#     --from-literal=SPRING_DATASOURCE_PASSWORD=multistate_dev_pw \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The app reads it as the env var SPRING_DATASOURCE_PASSWORD → Spring relaxed
# binding sets spring.datasource.password (env overrides the application.yml
# ${DB_PASSWORD} default).
apiVersion: v1
kind: Secret
metadata:
  name: multistate-api-secrets
  namespace: multistate-dev
  labels:
    app.kubernetes.io/name: multistate-api
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: replace-at-apply-time-from-secrets-manager
