# base/00-namespace.yaml — the namespace only.
# AUDIT NOTE (W6 D2): the W5 D3 00-namespace.yaml also bundled a ResourceQuota
# and a LimitRange. Both are on the AppProject namespaceResourceBlacklist
# (platform-team-owned), so a verbatim copy would make Argo CD refuse the sync.
# The overlay's `namespace:` transformer renames this object per env.
apiVersion: v1
kind: Namespace
metadata:
  name: multistate-dev
  labels:
    app.kubernetes.io/part-of: multistate
  annotations:
    # Land the Namespace one wave BEFORE the workload (default wave 0) on a
    # brand-new cluster. AUDIT NOTE: the task says do this via commonAnnotations,
    # but that stamps EVERY resource -1 -- flattening the very ordering it's meant
    # to create. The wave belongs on the Namespace resource itself.
    argocd.argoproj.io/sync-wave: "-1"
