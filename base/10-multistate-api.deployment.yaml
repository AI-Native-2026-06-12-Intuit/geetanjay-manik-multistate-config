# manifests/10-multistate-api.deployment.yaml — the workload.
# Image pinned by TAG (never :latest); zero-downtime RollingUpdate; non-root UID
# 65532 (the D1 distroless image). Config comes from the ConfigMap (30) + Secret
# (40) via envFrom; the three probes (Task 2) gate boot/traffic; the HPA is Task 3.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multistate-api
  namespace: multistate-dev
  labels:
    app.kubernetes.io/name:       multistate-api
    app.kubernetes.io/component:  api
    app.kubernetes.io/part-of:    multistate
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: multistate-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0     # never drop below replicas during a rollout
      maxSurge:       1     # at most one extra pod during a rollout
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      multistate-api    # MUST match the selector
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of:   multistate
      annotations:
        # A ConfigMap/Secret content change only rolls pods if the template
        # changes — CI recomputes these hashes; locally use `kubectl rollout
        # restart deploy/multistate-api`.
        checksum/config: "replace-at-apply-time"
        checksum/secret: "replace-at-apply-time"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    65532       # the distroless UID from W5 D1
        fsGroup:      65532
      containers:
        - name:  multistate-api
          image: uptimecrew/multistate-api:0.1.0
          imagePullPolicy: IfNotPresent      # use the k3d-imported image, no registry
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: multistate-api-config }
            - secretRef:    { name: multistate-api-secrets }
          env:
            # Make the JVM respect the cgroup memory limit, not host RAM.
            - name:  JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   {            memory: 1Gi   }   # CPU limit omitted (LimitRange fills it)

          # ----- three probes -----------------------------------------------
          # Distinct paths: liveness/startup on the liveness group, readiness on
          # the readiness group. Both probe sub-paths are permitted unauthenticated
          # by SecurityConfig (details stay gated by show-details=when-authorized).
          # httpGet (not exec): the distroless image has no shell.
          startupProbe:                               # owns the boot grace window
            httpGet: { path: /actuator/health/liveness, port: http }
            periodSeconds:    5
            failureThreshold: 30                      # 30 x 5s = 150s cold-start grace
            timeoutSeconds:   3
          livenessProbe:                              # "still alive?" — no dep checks
            httpGet: { path: /actuator/health/liveness, port: http }
            periodSeconds:      10
            timeoutSeconds:     3
            failureThreshold:   3
            initialDelaySeconds: 0                    # startupProbe owns the boot wait
          readinessProbe:                             # "ready for traffic?" — distinct path
            httpGet: { path: /actuator/health/readiness, port: http }
            periodSeconds:      5
            timeoutSeconds:     3
            failureThreshold:   3
            successThreshold:   1
            initialDelaySeconds: 0
