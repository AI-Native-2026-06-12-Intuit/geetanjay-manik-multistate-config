# base/kustomization.yaml — the W5 D3 manifests, kept identical across envs.
# Only the core deployable set lives here. Deliberately excluded (see GITOPS.md):
#   - 00-namespace's ResourceQuota + LimitRange  (AppProject blacklist)
#   - 60-multistate-api.ingress.yaml             (needs ingress-nginx; not on the
#                                                 smoke cluster, not in the whitelist)
#   - observability/ (ServiceMonitor/PrometheusRule/AlertmanagerConfig)
#                                                 (needs the Prometheus Operator CRDs)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00-namespace.yaml
  - 05-backing.yaml
  - 10-multistate-api.deployment.yaml
  - 20-multistate-api.service.yaml
  - 30-multistate-api.configmap.yaml
  - 40-multistate-api.secret.yaml
  - 50-multistate-api.hpa.yaml
