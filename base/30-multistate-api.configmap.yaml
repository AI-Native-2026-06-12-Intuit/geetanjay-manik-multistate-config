# manifests/30-multistate-api.configmap.yaml — non-secret env.
# Plain key/value pairs; hostnames are in-cluster DNS names that resolve to the
# matching Services. Anything sensitive belongs in the Secret (40), never here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: multistate-api-config
  namespace: multistate-dev
  labels:
    app.kubernetes.io/name: multistate-api
data:
  # smoke keeps the actuator probes + skips the base-schema (V1/V2) validation a
  # fresh Postgres can't satisfy; k8s (W5 D5) flips logback to the JSON appender
  # for Loki. Both active: smoke's DB behaviour + k8s JSON logs. (SPRING_PROFILES_
  # ACTIVE=k8s alone would drop smoke and break boot on the schemaless dev DB.)
  SPRING_PROFILES_ACTIVE:          smoke,k8s
  LOGGING_LEVEL_ROOT:              INFO
  SERVER_PORT:                     "8080"
  SPRING_DATASOURCE_URL:           jdbc:postgresql://postgres.multistate-dev.svc.cluster.local:5432/multistate_dev
  SPRING_DATASOURCE_USERNAME:      multistate_dev
  SPRING_DATA_REDIS_HOST:          redis.multistate-dev.svc.cluster.local
  SPRING_DATA_REDIS_PORT:          "6379"
  SPRING_KAFKA_BOOTSTRAP_SERVERS:  kafka.multistate-dev.svc.cluster.local:9092
  # No Mongo service in this stack → disable its health contributor so the
  # permitted aggregate /actuator/health (the probe target) stays UP.
  MANAGEMENT_HEALTH_MONGO_ENABLED: "false"
  OTEL_SERVICE_NAME:               multistate-api
  # OTel endpoint is a forward hook (no collector yet); smoke disables the
  # exporters, so this is inert until the W5 D5 / observability profile.
  OTEL_EXPORTER_OTLP_ENDPOINT:     http://otelcol.multistate-dev.svc.cluster.local:4317
